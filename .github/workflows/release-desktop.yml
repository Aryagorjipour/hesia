name: Release Desktop

on:
  push:
    tags:
      - "v*-desktop"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci --registry=https://registry.npmjs.org/

      - run: npm run build:desktop

      - name: Create updater manifest
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          VERSION=${VERSION%-desktop}
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          APPIMAGE_NAME=$(basename "$APPIMAGE")
          REPO="Aryagorjipour/hesia"
          TAG="${GITHUB_REF_NAME}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/${APPIMAGE_NAME}"
          cat > latest.json <<EOF
          {
            "version": "v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "linux-x86_64": {
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            latest.json

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci --registry=https://registry.npmjs.org/

      - run: npm run build:desktop

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
